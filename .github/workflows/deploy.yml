name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare dist (self-hosted static site — no build step)
        run: |
          mkdir -p dist/src/assets
          cp index.html dist/
          cp -R journal dist/ 2>/dev/null || true
          cp -R admin dist/ 2>/dev/null || true
          cp -R content dist/ 2>/dev/null || true
          # Copy only assets actually referenced by the site (favicons + WebP + JPG + crest)
          cp src/assets/favicon.ico             dist/src/assets/ 2>/dev/null || true
          cp src/assets/favicon-16.png          dist/src/assets/ 2>/dev/null || true
          cp src/assets/favicon-32.png          dist/src/assets/ 2>/dev/null || true
          cp src/assets/apple-touch-icon.png    dist/src/assets/ 2>/dev/null || true
          cp src/assets/logo-crest.png          dist/src/assets/ 2>/dev/null || true
          cp src/assets/*.webp                   dist/src/assets/ 2>/dev/null || true
          cp src/assets/*.jpg                    dist/src/assets/ 2>/dev/null || true
          echo "Deployed assets:"
          ls -la dist/src/assets/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
