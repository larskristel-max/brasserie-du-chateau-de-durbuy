<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin — Carnet du brasseur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0E0C0A;
      --ink-soft: rgba(14, 12, 10, 0.74);
      --ink-fade: rgba(14, 12, 10, 0.50);
      --cream: #F2EBDD;
      --cream-soft: #EDE5D2;
      --copper: #8C5E33;
      --copper-light: #A87E4F;
      --line: rgba(14, 12, 10, 0.16);
      --line-soft: rgba(14, 12, 10, 0.08);
      --error: #B84536;
      --success: #4A7C3E;
      --serif: 'Cormorant Garamond', 'Times New Roman', Georgia, serif;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --gutter: clamp(1.2rem, 4vw, 3rem);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      font-family: var(--sans);
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--ink);
      background: var(--cream);
    }

    button { font-family: inherit; cursor: pointer; }
    input, textarea, select { font-family: inherit; color: inherit; }

    /* ─── Layout ────────────────────────────────────────── */

    .admin {
      max-width: 56rem;
      margin: 0 auto;
      padding: 2.4rem var(--gutter) 6rem;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 1.4rem;
      border-bottom: 1px solid var(--line-soft);
      margin-bottom: 2.4rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .admin-header h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 1.6rem;
      margin: 0;
    }
    .admin-header h1 small {
      display: block;
      font-family: var(--sans);
      font-size: 0.62rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--copper);
      font-weight: 500;
      margin-bottom: 0.4rem;
    }
    .admin-header .actions {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    /* ─── Buttons ───────────────────────────────────────── */

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1rem;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 500;
      border: 1px solid currentColor;
      background: transparent;
      color: var(--ink-soft);
      transition: background-color 220ms ease, color 220ms ease, border-color 220ms ease;
    }
    .btn:hover { color: var(--ink); border-color: var(--ink); }
    .btn-primary {
      background: var(--ink);
      color: var(--cream);
      border-color: var(--ink);
    }
    .btn-primary:hover { background: var(--copper); border-color: var(--copper); color: var(--cream); }
    .btn-danger { color: var(--error); border-color: var(--error); }
    .btn-danger:hover { background: var(--error); color: var(--cream); border-color: var(--error); }
    .btn-link {
      border: 0;
      padding: 0.3rem 0;
      color: var(--copper);
      text-transform: none;
      letter-spacing: 0.06em;
      font-size: 0.8rem;
      background: transparent;
    }
    .btn-link:hover { color: var(--ink); }
    .btn:disabled { opacity: 0.5; cursor: wait; }

    /* ─── Toast / status messages ───────────────────────── */

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.9rem 1.4rem;
      background: var(--ink);
      color: var(--cream);
      font-size: 0.8rem;
      max-width: 24rem;
      box-shadow: 0 8px 24px rgba(14, 12, 10, 0.24);
      opacity: 0;
      transform: translateY(1rem);
      pointer-events: none;
      transition: opacity 240ms ease, transform 240ms ease;
      z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--error); }

    /* ─── Login screen ──────────────────────────────────── */

    .login {
      max-width: 28rem;
      margin: 6rem auto;
      padding: 0 var(--gutter);
    }
    .login h2 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 1.8rem;
      margin: 0 0 1rem;
    }
    .login p {
      color: var(--ink-soft);
      margin: 0 0 2rem;
      font-size: 0.92rem;
      line-height: 1.65;
    }
    .login a { color: var(--copper); }
    .login a:hover { color: var(--ink); }

    .login-form {
      display: grid;
      gap: 1.2rem;
    }
    .login-form input {
      width: 100%;
      padding: 0.7rem 0;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      font-family: 'Menlo', 'Monaco', monospace;
      font-size: 0.85rem;
    }
    .login-form input:focus {
      outline: none;
      border-bottom-color: var(--copper);
    }
    .login-help {
      font-size: 0.78rem;
      color: var(--ink-fade);
      line-height: 1.55;
      margin: 0;
    }
    .login-help code {
      background: rgba(140, 94, 51, 0.1);
      padding: 0.1rem 0.4rem;
      font-size: 0.72rem;
      border-radius: 2px;
    }

    /* ─── Article list ──────────────────────────────────── */

    .article-list { display: grid; gap: 0; }
    .article-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem 0;
      border-bottom: 1px solid var(--line-soft);
    }
    .article-row:last-child { border-bottom: 0; }

    .article-row-meta {
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
      margin-bottom: 0.3rem;
      flex-wrap: wrap;
    }
    .article-date {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-fade);
    }
    .article-lang {
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--copper);
      border: 1px solid currentColor;
      padding: 0.08rem 0.4rem;
      border-radius: 2px;
    }
    .article-status {
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.08rem 0.5rem;
      border-radius: 2px;
    }
    .status-draft { color: var(--copper); background: rgba(140, 94, 51, 0.12); }
    .status-published { color: var(--success); background: rgba(74, 124, 62, 0.12); }

    .article-title {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 1.2rem;
      line-height: 1.2;
      margin: 0;
      color: var(--ink);
    }
    .article-row-actions {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .empty-state {
      padding: 4rem var(--gutter);
      text-align: center;
      color: var(--ink-fade);
      font-style: italic;
      font-family: var(--serif);
    }

    /* ─── Edit form ─────────────────────────────────────── */

    .form-screen {
      display: grid;
      gap: 1.6rem;
    }
    .form-screen-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid var(--line-soft);
    }
    .form-screen-actions-right {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .form-row { display: grid; gap: 0.4rem; }
    .form-row label {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-fade);
      font-weight: 500;
    }
    .form-row input[type="text"],
    .form-row input[type="file"],
    .form-row input[type="date"],
    .form-row select,
    .form-row textarea {
      width: 100%;
      padding: 0.6rem 0;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      font-family: var(--serif);
      font-size: 1.05rem;
    }
    .form-row textarea {
      font-family: var(--serif);
      line-height: 1.55;
      resize: vertical;
      min-height: 4rem;
    }
    .form-row input[type="file"] {
      font-family: var(--sans);
      font-size: 0.86rem;
      color: var(--ink-soft);
    }
    .form-row input:focus,
    .form-row select:focus,
    .form-row textarea:focus {
      outline: none;
      border-bottom-color: var(--copper);
    }

    .form-row-split {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.2rem;
    }
    @media (max-width: 540px) {
      .form-row-split { grid-template-columns: 1fr; }
    }

    .form-hint {
      font-size: 0.74rem;
      color: var(--ink-fade);
      margin: 0;
    }

    .image-preview {
      display: grid;
      gap: 0.6rem;
      margin-top: 0.4rem;
    }
    .image-preview figure {
      margin: 0;
      border: 1px solid var(--line-soft);
      background: rgba(14, 12, 10, 0.025);
    }
    .image-preview img {
      width: 100%;
      max-height: 18rem;
      object-fit: cover;
      display: block;
    }
    .image-preview figcaption {
      padding: 0.6rem 0.8rem;
      font-size: 0.72rem;
      color: var(--ink-fade);
      font-style: italic;
    }
    .checkbox-row {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--ink-soft);
      font-size: 0.82rem;
    }

    .body-paragraphs { display: grid; gap: 0.8rem; }
    .body-paragraphs textarea {
      min-height: 5rem;
    }
    .paragraph-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.6rem;
      align-items: start;
    }
    .paragraph-row .btn-remove {
      align-self: start;
      margin-top: 0.4rem;
      padding: 0.4rem 0.6rem;
      font-size: 0.65rem;
    }

    /* ─── Hidden ────────────────────────────────────────── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Login screen -->
<div id="loginScreen" class="login">
  <h2>Admin du Carnet</h2>
  <p>Accès réservé à l'auteur du carnet. Connectez-vous avec votre adresse e-mail et votre mot de passe administrateur.</p>
  <form class="login-form" id="loginForm">
    <div class="form-row">
      <label for="emailInput">Adresse e-mail</label>
      <input type="email" id="emailInput" placeholder="brasseurduchateau@gmail.com" autocomplete="username" required>
    </div>
    <div class="form-row">
      <label for="passwordInput">Mot de passe</label>
      <input type="password" id="passwordInput" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn-primary">Se connecter</button>
  </form>
</div>

<!-- Admin screen -->
<div id="adminScreen" class="admin hidden">

  <header class="admin-header">
    <h1>
      <small>— Admin —</small>
      Carnet du brasseur
    </h1>
    <div class="actions">
      <button id="newArticleBtn" class="btn btn-primary">+ Nouvelle entrée</button>
      <button id="logoutBtn" class="btn">Se déconnecter</button>
    </div>
  </header>

  <main id="listView">
    <div id="articleList" class="article-list">
      <div class="empty-state">Chargement…</div>
    </div>
  </main>

  <main id="formView" class="hidden">
    <form class="form-screen" id="articleForm">
      <input type="hidden" id="articleId" value="">

      <div class="form-row">
        <label for="titleInput">Titre</label>
        <input type="text" id="titleInput" required minlength="2" maxlength="200" placeholder="Le premier brassin de mai">
      </div>

      <div class="form-row-split">
        <div class="form-row">
          <label for="dateInput">Date</label>
          <input type="date" id="dateInput" required>
        </div>
        <div class="form-row">
          <label for="languageInput">Langue</label>
          <select id="languageInput" required>
            <option value="fr">Français</option>
            <option value="nl">Nederlands</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
          </select>
        </div>
        <div class="form-row">
          <label for="statusInput">État</label>
          <select id="statusInput" required>
            <option value="draft">Brouillon</option>
            <option value="published">Publié</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <label for="ledeInput">Chapeau (1–2 phrases, en italique)</label>
        <textarea id="ledeInput" rows="2" maxlength="280" placeholder="Trois jours après la mise en cuve. La fermentation se calme."></textarea>
      </div>

      <div class="form-row">
        <label for="heroImageInput">Image principale</label>
        <input type="file" id="heroImageInput" accept="image/jpeg,image/png,image/webp">
        <input type="hidden" id="currentHeroImage" value="">
        <p class="form-hint">Format automatique en WebP, largeur maximale 1600 px.</p>
        <div id="heroImagePreview" class="image-preview hidden"></div>
      </div>

      <div class="form-row">
        <label for="heroImageCaptionInput">L&eacute;gende image (optionnel)</label>
        <input type="text" id="heroImageCaptionInput" maxlength="180" placeholder="La salle de brassage, avant le premier brassin.">
      </div>

      <label class="checkbox-row">
        <input type="checkbox" id="removeHeroImageInput">
        Retirer l'image principale
      </label>

      <div class="form-row">
        <label>Corps de l'article (un bloc par paragraphe)</label>
        <div id="bodyParagraphs" class="body-paragraphs">
          <!-- Paragraphs added dynamically -->
        </div>
        <p class="form-hint">
          <button type="button" id="addParagraphBtn" class="btn-link">+ Ajouter un paragraphe</button>
        </p>
      </div>

      <div class="form-row">
        <label for="authorInput">Auteur</label>
        <input type="text" id="authorInput" value="Lars Kristel" maxlength="80">
      </div>

      <div class="form-row">
        <label for="tagsInput">Mots-clés (séparés par des virgules)</label>
        <input type="text" id="tagsInput" placeholder="fermentation, blonde, mai">
      </div>

      <div class="form-screen-actions">
        <button type="button" id="deleteBtn" class="btn btn-danger hidden">Supprimer</button>
        <div class="form-screen-actions-right">
          <button type="button" id="cancelBtn" class="btn">Annuler</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Enregistrer</button>
        </div>
      </div>
    </form>
  </main>

</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
(function () {
  'use strict';

  // ────────────────────────────────────────────────────────
  // Configuration
  // ────────────────────────────────────────────────────────
  const ADMIN_API_URL = 'https://brasserie-admin-api.brasseurduchateau.workers.dev';
  const STORAGE_KEY = 'brewery-journal-session';
  const IMAGE_ASSET_DIR = 'src/assets/journal';
  const IMAGE_MAX_WIDTH = 1600;
  const IMAGE_QUALITY = 0.84;

  // ────────────────────────────────────────────────────────
  // State
  // ────────────────────────────────────────────────────────
  let sessionToken = null;
  let articlesData = { version: 1, articles: [] };
  let currentFileSha = null;
  let editingId = null;

  // ────────────────────────────────────────────────────────
  // DOM refs
  // ────────────────────────────────────────────────────────
  const loginScreen = document.getElementById('loginScreen');
  const adminScreen = document.getElementById('adminScreen');
  const listView = document.getElementById('listView');
  const formView = document.getElementById('formView');
  const articleList = document.getElementById('articleList');
  const articleForm = document.getElementById('articleForm');
  const bodyParagraphs = document.getElementById('bodyParagraphs');
  const heroImageInput = document.getElementById('heroImageInput');
  const currentHeroImage = document.getElementById('currentHeroImage');
  const heroImageCaptionInput = document.getElementById('heroImageCaptionInput');
  const removeHeroImageInput = document.getElementById('removeHeroImageInput');
  const heroImagePreview = document.getElementById('heroImagePreview');
  const toastEl = document.getElementById('toast');

  // ────────────────────────────────────────────────────────
  // Toast notifications
  // ────────────────────────────────────────────────────────
  let toastTimeout = null;
  function toast(message, type) {
    toastEl.textContent = message;
    toastEl.className = 'toast ' + (type || '') + ' show';
    if (toastTimeout) clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 3500);
  }

  // ────────────────────────────────────────────────────────
  // Admin API helpers
  // ────────────────────────────────────────────────────────
  function apiUrl(path) {
    return ADMIN_API_URL.replace(/\/$/, '') + path;
  }

  async function adminFetch(path, options = {}) {
    const headers = {
      'Accept': 'application/json',
      ...(options.headers || {}),
    };
    if (sessionToken) headers.Authorization = 'Bearer ' + sessionToken;
    if (options.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';

    const res = await fetch(apiUrl(path), { ...options, headers });
    if (res.status === 401) {
      logout(false);
      throw new Error('Session expirée. Reconnectez-vous.');
    }
    if (!res.ok) {
      let errorMessage = `Admin API ${res.status}`;
      try {
        const body = await res.json();
        if (body && body.error) errorMessage += ': ' + body.error;
      } catch (err) {
        errorMessage += ': ' + await res.text();
      }
      throw new Error(errorMessage);
    }
    return res.json();
  }

  async function fetchArticles() {
    return adminFetch('/api/articles');
  }

  async function saveArticles(newData, sha, message) {
    const result = await adminFetch('/api/articles', {
      method: 'PUT',
      body: JSON.stringify({ data: newData, sha, message }),
    });
    return result.sha;
  }

  async function saveAsset(path, base64Content, message) {
    return adminFetch('/api/assets', {
      method: 'PUT',
      body: JSON.stringify({
        path,
        base64Content,
        message,
      }),
    });
  }

  // ────────────────────────────────────────────────────────
  // Auth flow
  // ────────────────────────────────────────────────────────
  async function tryAuth(email, password) {
    const res = await fetch(apiUrl('/api/login'), {
      method: 'POST',
      headers: {
        'Accept': 'application/json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ email, password }),
    });
    if (!res.ok) return false;

    const data = await res.json();
    sessionToken = data.token;
    localStorage.setItem(STORAGE_KEY, sessionToken);
    loginScreen.classList.add('hidden');
    adminScreen.classList.remove('hidden');
    await loadAndRenderList();
    return true;
  }

  function logout(showToast = true) {
    sessionToken = null;
    localStorage.removeItem(STORAGE_KEY);
    adminScreen.classList.add('hidden');
    loginScreen.classList.remove('hidden');
    document.getElementById('passwordInput').value = '';
    if (showToast) toast('Déconnecté');
  }

  // ────────────────────────────────────────────────────────
  // List view
  // ────────────────────────────────────────────────────────
  async function loadAndRenderList() {
    articleList.innerHTML = '<div class="empty-state">Chargement…</div>';
    try {
      const { data, sha } = await fetchArticles();
      articlesData = data;
      currentFileSha = sha;
      renderList();
    } catch (err) {
      articleList.innerHTML = '<div class="empty-state">Erreur de chargement. Vérifiez votre token.</div>';
      toast('Erreur: ' + err.message, 'error');
      console.error(err);
    }
  }

  function renderList() {
    if (!articlesData.articles || articlesData.articles.length === 0) {
      articleList.innerHTML = '<div class="empty-state">Aucune entrée pour le moment. Cliquez sur "+ Nouvelle entrée" pour commencer.</div>';
      return;
    }
    // Sort by date desc
    const sorted = [...articlesData.articles].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    articleList.innerHTML = sorted.map(article => {
      const formattedDate = formatFrenchDate(article.date);
      const status = article.status === 'published' ? 'Publié' : 'Brouillon';
      const statusClass = article.status === 'published' ? 'status-published' : 'status-draft';
      return `
        <div class="article-row" data-id="${escapeHtml(article.id)}">
          <div>
            <div class="article-row-meta">
              <span class="article-date">${escapeHtml(formattedDate)}</span>
              <span class="article-lang">${escapeHtml(article.language || 'fr')}</span>
              <span class="article-status ${statusClass}">${status}</span>
            </div>
            <h3 class="article-title">${escapeHtml(article.title)}</h3>
          </div>
          <div class="article-row-actions">
            <button class="btn" data-action="edit" data-id="${escapeHtml(article.id)}">Modifier</button>
            ${article.status === 'draft'
              ? `<button class="btn" data-action="publish" data-id="${escapeHtml(article.id)}">Publier</button>`
              : `<button class="btn" data-action="unpublish" data-id="${escapeHtml(article.id)}">Mettre en brouillon</button>`}
          </div>
        </div>
      `;
    }).join('');

    // Wire up action buttons
    articleList.querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.getAttribute('data-action');
        const id = btn.getAttribute('data-id');
        if (action === 'edit') openEditForm(id);
        else if (action === 'publish') toggleStatus(id, 'published');
        else if (action === 'unpublish') toggleStatus(id, 'draft');
      });
    });
  }

  // ────────────────────────────────────────────────────────
  // Form view
  // ────────────────────────────────────────────────────────
  function openNewForm() {
    editingId = null;
    articleForm.reset();
    document.getElementById('articleId').value = '';
    document.getElementById('dateInput').value = new Date().toISOString().slice(0, 10);
    document.getElementById('statusInput').value = 'draft';
    document.getElementById('languageInput').value = 'fr';
    document.getElementById('authorInput').value = 'Lars Kristel';
    currentHeroImage.value = '';
    heroImageCaptionInput.value = '';
    removeHeroImageInput.checked = false;
    heroImageInput.value = '';
    updateHeroImagePreview('', '');
    bodyParagraphs.innerHTML = '';
    addParagraphRow('');
    document.getElementById('deleteBtn').classList.add('hidden');
    listView.classList.add('hidden');
    formView.classList.remove('hidden');
    document.getElementById('titleInput').focus();
  }

  function openEditForm(id) {
    const article = articlesData.articles.find(a => a.id === id);
    if (!article) {
      toast('Article introuvable', 'error');
      return;
    }
    editingId = id;
    document.getElementById('articleId').value = id;
    document.getElementById('titleInput').value = article.title || '';
    document.getElementById('dateInput').value = article.date || '';
    document.getElementById('languageInput').value = article.language || 'fr';
    document.getElementById('statusInput').value = article.status || 'draft';
    document.getElementById('ledeInput').value = article.lede || '';
    document.getElementById('authorInput').value = article.author || 'Lars Kristel';
    document.getElementById('tagsInput').value = (article.tags || []).join(', ');
    currentHeroImage.value = article.heroImage || '';
    heroImageCaptionInput.value = article.heroImageCaption || '';
    removeHeroImageInput.checked = false;
    heroImageInput.value = '';
    updateHeroImagePreview(article.heroImage || '', article.heroImageCaption || '');
    bodyParagraphs.innerHTML = '';
    (article.body || ['']).forEach(p => addParagraphRow(p));
    document.getElementById('deleteBtn').classList.remove('hidden');
    listView.classList.add('hidden');
    formView.classList.remove('hidden');
    window.scrollTo(0, 0);
  }

  function closeForm() {
    listView.classList.remove('hidden');
    formView.classList.add('hidden');
    editingId = null;
  }

  function addParagraphRow(text) {
    const row = document.createElement('div');
    row.className = 'paragraph-row';
    const textarea = document.createElement('textarea');
    textarea.rows = 3;
    textarea.value = text || '';
    textarea.placeholder = 'Paragraphe…';
    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'btn btn-remove';
    removeBtn.textContent = '−';
    removeBtn.title = 'Supprimer ce paragraphe';
    removeBtn.addEventListener('click', () => {
      if (bodyParagraphs.children.length > 1) row.remove();
      else toast('Au moins un paragraphe requis', 'error');
    });
    row.appendChild(textarea);
    row.appendChild(removeBtn);
    bodyParagraphs.appendChild(row);
  }

  function collectBodyParagraphs() {
    return Array.from(bodyParagraphs.querySelectorAll('textarea'))
      .map(t => t.value.trim())
      .filter(t => t.length > 0);
  }

  function updateHeroImagePreview(src, caption) {
    if (!src) {
      heroImagePreview.classList.add('hidden');
      heroImagePreview.innerHTML = '';
      return;
    }
    heroImagePreview.classList.remove('hidden');
    heroImagePreview.innerHTML = `
      <figure>
        <img src="${escapeHtml(src)}" alt="">
        ${caption ? `<figcaption>${escapeHtml(caption)}</figcaption>` : ''}
      </figure>
    `;
  }

  function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(reader.error);
      reader.readAsDataURL(file);
    });
  }

  function loadImage(dataUrl) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error('Image illisible'));
      img.src = dataUrl;
    });
  }

  function canvasToWebp(canvas) {
    return new Promise((resolve, reject) => {
      canvas.toBlob(blob => {
        if (!blob) reject(new Error('Conversion WebP impossible dans ce navigateur'));
        else resolve(blob);
      }, 'image/webp', IMAGE_QUALITY);
    });
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const value = String(reader.result || '');
        resolve(value.split(',')[1] || '');
      };
      reader.onerror = () => reject(reader.error);
      reader.readAsDataURL(blob);
    });
  }

  async function prepareHeroImage(file) {
    if (!file) return null;
    if (!file.type || !file.type.startsWith('image/')) {
      throw new Error('Le fichier choisi doit etre une image');
    }

    const dataUrl = await readFileAsDataUrl(file);
    const img = await loadImage(dataUrl);
    const scale = Math.min(1, IMAGE_MAX_WIDTH / img.naturalWidth);
    const width = Math.max(1, Math.round(img.naturalWidth * scale));
    const height = Math.max(1, Math.round(img.naturalHeight * scale));
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, width, height);

    const blob = await canvasToWebp(canvas);
    const base64 = await blobToBase64(blob);
    return { base64, previewUrl: URL.createObjectURL(blob) };
  }

  async function uploadHeroImage(file, title, date) {
    const prepared = await prepareHeroImage(file);
    if (!prepared) return null;
    const stamp = Date.now().toString(36);
    const filename = `${slugify(title)}-${date}-${stamp}.webp`;
    const path = `${IMAGE_ASSET_DIR}/${filename}`;
    await saveAsset(path, prepared.base64, `Ajouter image journal : ${title}`);
    return '/' + path;
  }

  async function saveArticle(e) {
    e.preventDefault();
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;

    const title = document.getElementById('titleInput').value.trim();
    const date = document.getElementById('dateInput').value;
    const language = document.getElementById('languageInput').value;
    const status = document.getElementById('statusInput').value;
    const lede = document.getElementById('ledeInput').value.trim();
    const author = document.getElementById('authorInput').value.trim() || 'Lars Kristel';
    const tagsRaw = document.getElementById('tagsInput').value.trim();
    const body = collectBodyParagraphs();
    const selectedHeroFile = heroImageInput.files && heroImageInput.files[0] ? heroImageInput.files[0] : null;
    const removeHeroImage = removeHeroImageInput.checked;
    const heroImageCaption = heroImageCaptionInput.value.trim();

    if (!title || !date || body.length === 0) {
      toast('Titre, date, et au moins un paragraphe sont requis', 'error');
      saveBtn.disabled = false;
      return;
    }

    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
    const now = new Date().toISOString();
    let heroImage = removeHeroImage ? null : (currentHeroImage.value || null);
    if (selectedHeroFile) {
      try {
        heroImage = await uploadHeroImage(selectedHeroFile, title, date);
      } catch (err) {
        toast('Erreur image: ' + err.message, 'error');
        saveBtn.disabled = false;
        return;
      }
    }

    let article;
    if (editingId) {
      const existing = articlesData.articles.find(a => a.id === editingId);
      article = {
        ...existing,
        title, date, language, status, lede, author, tags, body,
        heroImage,
        heroImageCaption: heroImage ? heroImageCaption : '',
        updatedAt: now,
      };
      const idx = articlesData.articles.findIndex(a => a.id === editingId);
      articlesData.articles[idx] = article;
    } else {
      const id = slugify(title) + '-' + date;
      // Avoid duplicate IDs
      if (articlesData.articles.some(a => a.id === id)) {
        toast('Un article avec ce titre et cette date existe déjà', 'error');
        saveBtn.disabled = false;
        return;
      }
      article = {
        id, title, date, language, status, lede, author, tags, body,
        heroImage,
        heroImageCaption: heroImage ? heroImageCaption : '',
        createdAt: now,
        updatedAt: now,
      };
      articlesData.articles.unshift(article);
    }

    try {
      const newSha = await saveArticles(
        articlesData,
        currentFileSha,
        (editingId ? 'Modifier' : 'Créer') + ` : ${title}`
      );
      currentFileSha = newSha;
      toast(editingId ? 'Article modifié' : 'Article créé', 'success');
      closeForm();
      renderList();
    } catch (err) {
      toast('Erreur: ' + err.message, 'error');
      console.error(err);
      // Revert local change on failure
      if (!editingId) {
        articlesData.articles.shift();
      }
    } finally {
      saveBtn.disabled = false;
    }
  }

  async function deleteArticle() {
    if (!editingId) return;
    const article = articlesData.articles.find(a => a.id === editingId);
    if (!confirm(`Supprimer définitivement "${article.title}" ? Cette action est irréversible.`)) return;
    const idx = articlesData.articles.findIndex(a => a.id === editingId);
    if (idx < 0) return;
    const removed = articlesData.articles.splice(idx, 1)[0];
    try {
      const newSha = await saveArticles(articlesData, currentFileSha, `Supprimer : ${removed.title}`);
      currentFileSha = newSha;
      toast('Article supprimé', 'success');
      closeForm();
      renderList();
    } catch (err) {
      // Revert
      articlesData.articles.splice(idx, 0, removed);
      toast('Erreur: ' + err.message, 'error');
    }
  }

  async function toggleStatus(id, newStatus) {
    const article = articlesData.articles.find(a => a.id === id);
    if (!article) return;
    const prevStatus = article.status;
    article.status = newStatus;
    article.updatedAt = new Date().toISOString();
    try {
      const newSha = await saveArticles(
        articlesData,
        currentFileSha,
        `${newStatus === 'published' ? 'Publier' : 'Mettre en brouillon'} : ${article.title}`
      );
      currentFileSha = newSha;
      toast(newStatus === 'published' ? 'Publié' : 'Mis en brouillon', 'success');
      renderList();
    } catch (err) {
      article.status = prevStatus; // revert
      toast('Erreur: ' + err.message, 'error');
    }
  }

  // ────────────────────────────────────────────────────────
  // Helpers
  // ────────────────────────────────────────────────────────
  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function slugify(text) {
    return text.toLowerCase()
      .replace(/[àáâäãå]/g, 'a')
      .replace(/[èéêë]/g, 'e')
      .replace(/[ìíîï]/g, 'i')
      .replace(/[òóôöõ]/g, 'o')
      .replace(/[ùúûü]/g, 'u')
      .replace(/[ç]/g, 'c')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '')
      .slice(0, 80);
  }

  function formatFrenchDate(iso) {
    if (!iso) return '';
    const months = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin',
                    'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
    const d = new Date(iso + 'T12:00:00Z');
    return `${d.getUTCDate()} ${months[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
  }

  // ────────────────────────────────────────────────────────
  // Wire up
  // ────────────────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    if (!email || !password) return;
    const ok = await tryAuth(email, password);
    if (!ok) toast('Identifiants invalides', 'error');
  });

  document.getElementById('newArticleBtn').addEventListener('click', openNewForm);
  document.getElementById('logoutBtn').addEventListener('click', logout);
  document.getElementById('cancelBtn').addEventListener('click', closeForm);
  document.getElementById('addParagraphBtn').addEventListener('click', () => addParagraphRow(''));
  document.getElementById('deleteBtn').addEventListener('click', deleteArticle);
  heroImageInput.addEventListener('change', async () => {
    const file = heroImageInput.files && heroImageInput.files[0] ? heroImageInput.files[0] : null;
    if (!file) {
      updateHeroImagePreview(currentHeroImage.value, heroImageCaptionInput.value.trim());
      return;
    }
    try {
      const dataUrl = await readFileAsDataUrl(file);
      updateHeroImagePreview(dataUrl, heroImageCaptionInput.value.trim());
      removeHeroImageInput.checked = false;
    } catch (err) {
      toast('Image illisible', 'error');
    }
  });
  heroImageCaptionInput.addEventListener('input', () => {
    if (removeHeroImageInput.checked) return;
    const previewImg = heroImagePreview.querySelector('img');
    updateHeroImagePreview(previewImg ? previewImg.getAttribute('src') : currentHeroImage.value, heroImageCaptionInput.value.trim());
  });
  removeHeroImageInput.addEventListener('change', () => {
    if (removeHeroImageInput.checked) updateHeroImagePreview('', '');
    else updateHeroImagePreview(currentHeroImage.value, heroImageCaptionInput.value.trim());
  });
  articleForm.addEventListener('submit', saveArticle);

  // Auto-login if a session token is still valid.
  const storedSession = localStorage.getItem(STORAGE_KEY);
  if (storedSession) {
    sessionToken = storedSession;
    loginScreen.classList.add('hidden');
    adminScreen.classList.remove('hidden');
    loadAndRenderList().catch(() => logout(false));
  }
})();
</script>
